naftiko: "1.0.0-alpha1"

info:
  label: "Telefon Voice API"
  description: "Programmable voice API for calls, conferencing, IVR, and recording across 180+ countries."
  tags:
    - Calls
    - Communications
    - Conferencing
    - IVR
    - Telephony
    - Voice
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      TELEFON_API_KEY: TELEFON_API_KEY

capability:
  consumes:
    - type: http
      namespace: telefon-voice
      baseUri: https://api.telefon.com/v1/voice
      description: "Telefon Voice API for programmable calling"
      authentication:
        type: apikey
        key: X-API-Key
        value: "{{TELEFON_API_KEY}}"
        placement: header
      resources:
        - name: calls
          path: /calls
          description: "Voice call management"
          operations:
            - name: list-calls
              method: GET
              description: "List calls with optional filtering"
              inputParameters:
                - name: status
                  in: query
                  type: string
                  required: false
                  description: "Filter by call status"
                - name: direction
                  in: query
                  type: string
                  required: false
                  description: "Filter: inbound or outbound"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-call
              method: POST
              description: "Initiate an outbound voice call"
              inputParameters:
                - name: to
                  in: body
                  type: string
                  required: true
                  description: "Destination number (E.164)"
                - name: from
                  in: body
                  type: string
                  required: true
                  description: "Caller ID number"
                - name: url
                  in: body
                  type: string
                  required: false
                  description: "Call flow webhook URL"
                - name: record
                  in: body
                  type: boolean
                  required: false
                  description: "Auto-record the call"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: conferences
          path: /conferences
          description: "Conference call management"
          operations:
            - name: list-conferences
              method: GET
              description: "List conferences"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-conference
              method: POST
              description: "Create a conference room"
              inputParameters:
                - name: friendly_name
                  in: body
                  type: string
                  required: false
                  description: "Conference name"
                - name: record
                  in: body
                  type: boolean
                  required: false
                  description: "Auto-record the conference"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8130
      namespace: telefon-voice-rest
      resources:
        - path: /v1/calls
          name: calls
          operations:
            - method: GET
              name: list-calls
              description: "List voice calls"
              call: "telefon-voice.list-calls"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-call
              description: "Initiate a voice call"
              call: "telefon-voice.create-call"
              with:
                to: "rest.to"
                from: "rest.from"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9130
      namespace: telefon-voice-mcp
      transport: http
      tools:
        - name: list-calls
          description: "List voice calls with status and direction filters"
          hints:
            readOnly: true
            openWorld: false
          call: "telefon-voice.list-calls"
          outputParameters:
            - type: object
              mapping: "$."
        - name: make-call
          description: "Initiate an outbound voice call"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "telefon-voice.create-call"
          with:
            to: "tools.to"
            from: "tools.from"
            record: "tools.record"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-conferences
          description: "List conference calls"
          hints:
            readOnly: true
            openWorld: false
          call: "telefon-voice.list-conferences"
          outputParameters:
            - type: object
              mapping: "$."
