naftiko: "1.0.0-alpha1"

info:
  label: "Telefon SMS API"
  description: "Global SMS and MMS API with delivery receipts and inbound webhooks."
  tags:
    - Communications
    - Messaging
    - MMS
    - SMS
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      TELEFON_API_KEY: TELEFON_API_KEY

capability:
  consumes:
    - type: http
      namespace: telefon-sms
      baseUri: https://api.telefon.com/v1/sms
      description: "Telefon SMS API"
      authentication:
        type: apikey
        key: X-API-Key
        value: "{{TELEFON_API_KEY}}"
        placement: header
      resources:
        - name: messages
          path: /messages
          description: "SMS and MMS messaging"
          operations:
            - name: list-messages
              method: GET
              description: "List messages"
              inputParameters:
                - name: direction
                  in: query
                  type: string
                  required: false
                  description: "inbound or outbound"
                - name: status
                  in: query
                  type: string
                  required: false
                  description: "Filter by delivery status"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: send-message
              method: POST
              description: "Send an SMS or MMS message"
              inputParameters:
                - name: to
                  in: body
                  type: string
                  required: true
                  description: "Recipient number (E.164)"
                - name: from
                  in: body
                  type: string
                  required: true
                  description: "Sender number"
                - name: body
                  in: body
                  type: string
                  required: false
                  description: "Message text"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8131
      namespace: telefon-sms-rest
      resources:
        - path: /v1/messages
          name: messages
          operations:
            - method: GET
              name: list-messages
              description: "List messages"
              call: "telefon-sms.list-messages"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: send-message
              description: "Send a message"
              call: "telefon-sms.send-message"
              with:
                to: "rest.to"
                from: "rest.from"
                body: "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9131
      namespace: telefon-sms-mcp
      transport: http
      tools:
        - name: list-messages
          description: "List SMS and MMS messages"
          hints:
            readOnly: true
            openWorld: false
          call: "telefon-sms.list-messages"
          outputParameters:
            - type: object
              mapping: "$."
        - name: send-sms
          description: "Send an SMS or MMS message"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "telefon-sms.send-message"
          with:
            to: "tools.to"
            from: "tools.from"
            body: "tools.body"
          outputParameters:
            - type: object
              mapping: "$."
