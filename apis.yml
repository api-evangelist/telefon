    description: >-
      API for making and managing voice calls through the Telefon platform.
    image: https://example.com/telefon-voice-icon.png
    humanURL: https://telefon.example.com/docs/voice
    baseURL: https://api.telefon.example.com/v1/voice
    version: v1
    tags:
      - Voice
      - Calls
      - Telephony
      - Communications
    properties:
