        url: https://api.telefon.example.com/v1/voice/openapi.json
      - type: Swagger
        url: https://api.telefon.example.com/v1/voice/swagger.json
      - type: Authentication
        url: https://telefon.example.com/docs/authentication
      - type: Pricing
        url: https://telefon.example.com/pricing/voice
    contact:
      - FN: Telefon Voice API Support
        email: voice-api@telefon.example.com
        X-twitter: telefonvoice
